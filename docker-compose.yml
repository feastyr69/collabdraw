version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  frontend:
    build:
      context: ./apps/frontend
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000
    # Enable hot reloading for Vite
    command: npm run dev -- --host

  backend:
    build:
      context: ./apps/backend
    ports:
      - "3000:3000"
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - NEON_DATABASE_URL=${NEON_DATABASE_URL}
    depends_on:
      - redis

volumes:
  redis_data:
